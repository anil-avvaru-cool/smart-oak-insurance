version: "3.9"

services:
  redis:
    image: redis:7.2
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5.11
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/test"
      NEO4J_dbms_default__advertised__address: "0.0.0.0"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  app:
    build: .
    depends_on:
      - redis
      - neo4j
    volumes:
      - .:/app
    environment:
      REDIS_URL: "redis://redis:6379/0"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "Pass@word1"    

volumes:
  neo4j_data:
  neo4j_logs:
